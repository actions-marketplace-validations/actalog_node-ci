name: '@actalog/node-ci'
description: 'CI pipeline for Node.js: setup, conditional scripts, SonarCloud, artifacts, and PR reports.'
author: Gabriel Rufino <contato@gabrielrufino.com>
branding:
  icon: refresh-ccw
  color: green

inputs:
  except:
    required: false
    default: ''
  github-token:
    required: false
  node-version:
    required: false
    default: 24
  package-manager:
    required: false
    default: npm
    description: 'The package manager to use (npm, yarn, or pnpm)'
  sonar-token:
    required: false

runs:
  using: composite
  steps:
    - uses: actalog/expect@v1
      with:
        type: enum
        value: ${{ inputs.package-manager }}
        options: npm,yarn,pnpm
    # First call: Install Node.js so that 'corepack' is available in the environment
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    - run: corepack enable
      shell: bash
    # Second call: Configure cache. This must happen AFTER 'corepack enable'
    # so that the caching logic can find the pnpm/yarn executables in the PATH.
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        # Only enable caching if the corresponding lock file exists
        cache: >-
          ${{
            (inputs.package-manager == 'pnpm' && hashFiles('pnpm-lock.yaml') != '') && 'pnpm' ||
            (inputs.package-manager == 'yarn' && hashFiles('yarn.lock') != '') && 'yarn' ||
            (inputs.package-manager == 'npm' && hashFiles('package-lock.json') != '') && 'npm' ||
            ''
          }}
    - id: package-manager
      run: |
        if [ "${{ inputs.package-manager }}" == "yarn" ]; then
          echo "pkg_cmd=yarn" >> $GITHUB_OUTPUT
          echo "install_cmd=yarn install --immutable || yarn install" >> $GITHUB_OUTPUT
        elif [ "${{ inputs.package-manager }}" == "pnpm" ]; then
          echo "pkg_cmd=pnpm" >> $GITHUB_OUTPUT
          echo "install_cmd=pnpm install --frozen-lockfile || pnpm install" >> $GITHUB_OUTPUT
        else
          echo "pkg_cmd=npm" >> $GITHUB_OUTPUT
          echo "install_cmd=npm ci || npm install" >> $GITHUB_OUTPUT
        fi
      shell: bash
    - id: scripts
      run: |
        scripts=$(cat package.json | jq -c '.scripts | keys')
        echo "scripts=$scripts" >> $GITHUB_OUTPUT
      shell: bash
    - run: time (${{ steps.package-manager.outputs.install_cmd }})
      shell: bash
    - id: build
      if: ${{ contains(steps.scripts.outputs.scripts, 'build') && !contains(inputs.except, 'build') }}
      run: time ${{ steps.package-manager.outputs.pkg_cmd }} run build
      shell: bash
    - id: lint
      if: ${{ contains(steps.scripts.outputs.scripts, 'lint') && !contains(inputs.except, 'lint') }}
      run: time ${{ steps.package-manager.outputs.pkg_cmd }} run lint
      shell: bash
    - id: test
      if: ${{ contains(steps.scripts.outputs.scripts, 'test') && !contains(inputs.except, 'test') }}
      run: ${{ steps.package-manager.outputs.pkg_cmd }} test
      shell: bash
    - run: ${{ steps.package-manager.outputs.pkg_cmd }} run test:e2e
      if: ${{ contains(steps.scripts.outputs.scripts, 'test:e2e') && !contains(inputs.except, 'test:e2e') }}
      shell: bash
    - run: ${{ steps.package-manager.outputs.pkg_cmd }} run test:cov
      if: ${{ contains(steps.scripts.outputs.scripts, 'test:cov') && !contains(inputs.except, 'test') }}
      shell: bash
    - if: ${{ inputs.sonar-token && inputs.github-token }}
      uses: SonarSource/sonarcloud-github-action@master
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
    - uses: actions/upload-artifact@v4
      with:
        name: node-ci
        path: |
          dist
          coverage
        if-no-files-found: ignore
      continue-on-error: true
    - if: ${{ always() && github.event_name == 'pull_request' }}
      id: info
      run: |
        size=$(du -sh node_modules | cut -f1)
        echo "size=$size" >> $GITHUB_OUTPUT

        {
          echo 'outdated<<EOF'
          echo "$(${{ steps.package-manager.outputs.pkg_cmd }} outdated)"
          echo 'EOF'
        } >> $GITHUB_OUTPUT
      shell: bash
      continue-on-error: true
    - if: ${{ always() && github.event_name == 'pull_request' }}
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          # @actalog/node-ci

          Node CI completed!

          ## Steps

          | Step      | Status                     |
          | --------- | -------------------------- |
          | **Build** | ${{ steps.build.outcome }} |
          | **Lint**  | ${{ steps.lint.outcome }}  |
          | **Test**  | ${{ steps.test.outcome }}  |

          ## Statistics

          * **node_modules size:** ${{ steps.info.outputs.size }}

          ## Outdated packages

          ```
          ${{ steps.info.outputs.outdated || 'No outdated packages' }}
          ```

          ## Environment

          * **Runner OS:** ${{ runner.os }}
          * **Runner Arch:** ${{ runner.arch }}
          * **Node version:** ${{ inputs.node-version }}
          * **Package manager:** ${{ inputs.package-manager }}
      continue-on-error: true
